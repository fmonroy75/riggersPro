<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Redirige a la ruta base real
      var basePath = '/riggersPro/';
      var path = window.location.pathname;
      if (!path.startsWith(basePath)) {
        var newPath = basePath + path.replace(/^\//, '');
        window.location.replace(newPath);
      }
    </script>
  </head>
</html>
